<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xpenso — Smart Data Tools</title>
  <link rel="icon" type="image/png" href="image/logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Cabin:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --hot:    #FF2D78;
      --sun:    #FFD000;
      --volt:   #7B2FFF;
      --ice:    #00E5FF;
      --mint:   #00FF9D;
      --ink:    #9966cc;
      --r: 22px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Cabin', sans-serif; background: var(--ink); color: #fff; overflow-x: hidden; }

    /* ── BLOB BG ── */
    #blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .b { position: absolute; border-radius: 50%; filter: blur(90px); animation: pulse 10s ease-in-out infinite alternate; }
    .b1 { width: 600px; height: 600px; background: var(--volt); opacity: .28; top: -200px; left: -150px; animation-duration: 12s; }
    .b2 { width: 480px; height: 480px; background: var(--hot);  opacity: .3;  bottom: -150px; right: -120px; animation-duration: 9s;  animation-delay:-3s; }
    .b3 { width: 380px; height: 380px; background: var(--ice);  opacity: .22; top: 45%; left: 35%;  animation-duration: 14s; animation-delay:-6s; }
    .b4 { width: 300px; height: 300px; background: var(--sun);  opacity: .25; top: 55%; right: 15%; animation-duration: 11s; animation-delay:-1s; }
    @keyframes pulse { from { transform: scale(1) translate(0,0); } to { transform: scale(1.12) translate(30px,20px); } }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 999;
      background: rgba(9,9,15,.88); backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 70px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.55rem;
      text-decoration: none; letter-spacing: -1px;
      background: linear-gradient(90deg, var(--hot), var(--sun));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand img { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; }
    .links { display: flex; gap: .15rem; list-style: none; }
    .links a {
      color: rgba(255,255,255,.6); text-decoration: none;
      padding: .42rem .9rem; border-radius: 10px;
      font-size: .9rem; font-weight: 600; transition: background .18s, color .18s;
    }
    .links a:hover { background: rgba(255,255,255,.09); color: #fff; }
    .links a.on { background: linear-gradient(90deg,var(--hot),#ff8240); color:#fff; }
    .npill {
      background: linear-gradient(90deg, var(--volt), var(--ice));
      color: #fff; padding: .5rem 1.2rem; border-radius: 99px;
      font-weight: 800; font-size: .88rem; text-decoration: none;
      transition: transform .15s, box-shadow .2s;
    }
    .npill:hover { transform: scale(1.06); box-shadow: 0 0 22px rgba(123,47,255,.6); }
    .ham { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; }
    .ham span { width: 22px; height: 2px; background: #fff; border-radius: 2px; }

    /* ── Z WRAP ── */
    .z { position: relative; z-index: 1; }

    /* ── HERO ── */
    .hero {
      min-height: 93vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 5rem 2rem 4rem;
      position: relative; z-index: 1;
    }
    .htag {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,208,0,.14); border: 1.5px solid rgba(255,208,0,.45);
      color: var(--sun); padding: .38rem 1.1rem; border-radius: 99px;
      font-size: .8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 1.8rem;
      animation: popIn .55s cubic-bezier(.34,1.56,.64,1) both;
    }
    .hero h1 {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(3rem, 7.5vw, 5.8rem);
      font-weight: 900; line-height: 1.03; letter-spacing: -2.5px;
      margin-bottom: 1.4rem;
      animation: riseUp .7s .1s cubic-bezier(.22,1,.36,1) both;
    }
    .hero h1 .w1 { color: var(--sun); display: inline-block; transform: rotate(-2.5deg); }
    .hero h1 .w2 {
      background: linear-gradient(100deg, var(--hot) 0%, var(--volt) 60%, var(--ice) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: rgba(255,255,255,.58); font-size: 1.15rem;
      max-width: 550px; margin: 0 auto 2.8rem; line-height: 1.72;
      animation: riseUp .7s .22s cubic-bezier(.22,1,.36,1) both;
    }
    .hbtns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; animation: riseUp .7s .34s cubic-bezier(.22,1,.36,1) both; }
    .bpop { padding: .88rem 2.1rem; border-radius: 14px; font-weight: 800; font-size: 1rem; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: transform .15s, box-shadow .2s; }
    .bpop:hover { transform: translateY(-3px) scale(1.03); }
    .bhot  { background: linear-gradient(135deg,var(--hot),#FF7B2F); color:#fff; box-shadow: 0 8px 30px rgba(255,45,120,.4); }
    .bhot:hover  { box-shadow: 0 14px 40px rgba(255,45,120,.6); }
    .bghost { background: rgba(255,255,255,.07); border: 1.5px solid rgba(255,255,255,.18); color: #fff; }
    .bghost:hover { background: rgba(255,255,255,.13); }

    .deco { position: absolute; font-size: 2rem; opacity: .5; pointer-events: none; animation: floatY 4s ease-in-out infinite alternate; }
    .deco:nth-child(1) { top: 13%; left: 7%;  animation-duration:5s; }
    .deco:nth-child(2) { top: 18%; right:6%;  animation-duration:3.5s; animation-delay:-1s; }
    .deco:nth-child(3) { bottom:16%; left:6%; animation-duration:6s; animation-delay:-2s; }
    .deco:nth-child(4) { bottom:20%; right:5%;animation-duration:4.5s; animation-delay:-3s; }
    @keyframes floatY { from {transform:translateY(0) rotate(-4deg);} to {transform:translateY(-18px) rotate(5deg);} }

    /* ── STATS BAR ── */
    .stats-bar {
      position: relative; z-index: 1;
      background: linear-gradient(90deg, var(--hot), #C026D3, var(--volt));
      padding: 1.6rem 2rem;
      display: flex; justify-content: center; gap: 3.5rem; flex-wrap: wrap;
    }
    .sstat { text-align: center; }
    .snum { font-family: 'Nunito', sans-serif; font-size: 2rem; font-weight: 900; display: block; line-height:1; }
    .slbl { font-size: .83rem; color: rgba(255,255,255,.75); font-weight: 600; }

    /* ── SECTIONS ── */
    section { position: relative; z-index: 1; padding: 5.5rem 2rem; }
    .inn { max-width: 1120px; margin: 0 auto; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: .3rem .95rem; border-radius: 99px;
      font-size: .78rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .chip-hot  { background: linear-gradient(90deg,var(--sun),var(--hot)); color: var(--ink); }
    .chip-volt { background: linear-gradient(90deg,var(--volt),var(--ice)); color: #fff; }
    .chip-mint { background: linear-gradient(90deg,var(--mint),var(--ice)); color: var(--ink); }
    .stitle { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: clamp(2rem,4.5vw,2.9rem); letter-spacing:-1px; line-height:1.1; margin-bottom:.9rem; }
    .ssub  { color: rgba(255,255,255,.5); font-size:1.05rem; max-width:520px; margin-bottom:3rem; }

    /* ── CARDS ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(295px, 1fr)); gap: 1.4rem; }
    .card {
      border-radius: var(--r); padding: 2rem 1.8rem;
      text-decoration: none; color: inherit;
      position: relative; overflow: hidden;
      transition: transform .22s, box-shadow .22s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-7px) rotate(.4deg); }
    .card::before { content:''; position:absolute; inset:0; border-radius:var(--r); background:radial-gradient(circle at 75% 15%, rgba(255,255,255,.07), transparent 55%); pointer-events:none; }

    .ck1 { background: linear-gradient(145deg,#1a0040,#32008a); border: 1.5px solid rgba(123,47,255,.45); }
    .ck2 { background: linear-gradient(145deg,#240000,#5c1000); border: 1.5px solid rgba(255,45,120,.45); }
    .ck3 { background: linear-gradient(145deg,#001520,#003850); border: 1.5px solid rgba(0,229,255,.4); }
    .ck4 { background: linear-gradient(145deg,#001800,#003800); border: 1.5px solid rgba(0,255,157,.4); }
    .ck5 { background: linear-gradient(145deg,#1e0020,#440050); border: 1.5px solid rgba(255,45,120,.4); }
    .ck6 { background: linear-gradient(145deg, var(--volt), var(--hot)); border: none; }

    .cej  { font-size: 2.9rem; margin-bottom: 1rem; display: block; }
    .card h3 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.25rem; margin-bottom:.5rem; }
    .card p  { color: rgba(255,255,255,.57); font-size: .92rem; line-height:1.62; }
    .carrow {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .83rem; font-weight: 800; margin-top: 1rem;
      padding: .32rem .88rem; border-radius: 99px;
      background: rgba(255,255,255,.11); color:#fff; text-decoration:none;
      transition: background .2s;
    }
    .carrow:hover { background: rgba(255,255,255,.2); }

    /* ── STEPS ── */
    .steps { display:flex; flex-direction:column; gap:1rem; max-width:720px; }
    .srow {
      display:flex; gap:1.25rem; align-items:flex-start;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
      border-radius:16px; padding:1.5rem;
      transition:background .2s, transform .2s;
    }
    .srow:hover { background:rgba(255,255,255,.08); transform:translateX(7px); }
    .srow:nth-child(1) .sn { background: linear-gradient(135deg,var(--hot),#FF7B2F); }
    .srow:nth-child(2) .sn { background: linear-gradient(135deg,var(--volt),var(--ice)); }
    .srow:nth-child(3) .sn { background: linear-gradient(135deg,#00C896,var(--ice)); }
    .srow:nth-child(4) .sn { background: linear-gradient(135deg,var(--sun),#FF7B2F); }
    .srow:nth-child(5) .sn { background: linear-gradient(135deg,var(--mint),var(--ice)); }
    .sn { flex-shrink:0; width:44px; height:44px; border-radius:12px; font-family:'Nunito',sans-serif; font-weight:900; font-size:1.2rem; color:var(--ink); display:flex; align-items:center; justify-content:center; }
    .srow h4 { font-family:'Nunito',sans-serif; font-weight:800; font-size:1.05rem; margin-bottom:.3rem; }
    .srow p  { color:rgba(255,255,255,.52); font-size:.92rem; }

    /* ── TABLE ── */
    .twrap { overflow-x:auto; border-radius:20px; border:1.5px solid rgba(255,255,255,.1); }
    table { width:100%; border-collapse:collapse; font-size:.94rem; }
    thead { background:linear-gradient(90deg,var(--volt),var(--hot)); }
    thead th { padding:1rem 1.25rem; text-align:left; font-family:'Nunito',sans-serif; font-weight:900; color:#fff; }
    tbody tr { border-bottom:1px solid rgba(255,255,255,.07); transition:background .15s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(255,255,255,.04); }
    tbody td { padding:.88rem 1.25rem; color:rgba(255,255,255,.72); }
    tbody td:first-child { font-weight:800; color:var(--sun); }

    /* ── CTA ── */
    .ctabox {
      border-radius:32px; overflow:hidden;
      background: linear-gradient(135deg, var(--hot) 0%, var(--volt) 50%, var(--ice) 100%);
      padding:5rem 2rem; text-align:center; position:relative;
    }
    .ctabox::before {
      content:''; position:absolute; inset:0;
      background:url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='25' cy='25' r='1.5' fill='%23ffffff' fill-opacity='0.07'/%3E%3C/svg%3E");
    }
    .ctabox h2 { font-family:'Nunito',sans-serif; font-weight:900; font-size:2.3rem; margin-bottom:.7rem; position:relative; letter-spacing:-1px; }
    .ctabox p  { opacity:.82; margin-bottom:2.2rem; font-size:1.08rem; position:relative; }
    .bink {
      background:var(--ink); color:var(--sun);
      padding:.88rem 2.2rem; border-radius:14px;
      font-family:'Nunito',sans-serif; font-weight:900; font-size:1rem;
      text-decoration:none; position:relative; display:inline-block;
      box-shadow:0 0 0 3px rgba(255,208,0,.3);
      transition:transform .15s, box-shadow .2s;
    }
    .bink:hover { transform:scale(1.06); box-shadow:0 0 0 5px rgba(255,208,0,.5), 0 14px 34px rgba(0,0,0,.4); }

    /* ── FOOTER ── */
    footer {
      position:relative; z-index:1;
      background:rgba(0,0,0,.55); border-top:1px solid rgba(255,255,255,.07);
      padding:2.5rem 2rem; text-align:center;
    }
    .flinks { display:flex; justify-content:center; gap:1.5rem; margin-bottom:.8rem; flex-wrap:wrap; }
    .flinks a { color:rgba(255,255,255,.38); text-decoration:none; font-size:.87rem; transition:color .2s; }
    .flinks a:hover { color:var(--sun); }
    footer p { color:rgba(255,255,255,.28); font-size:.84rem; }
    footer a { color:var(--hot); text-decoration:none; }

    /* ── KEYFRAMES ── */
    @keyframes popIn  { from{opacity:0;transform:scale(.65);}  to{opacity:1;transform:scale(1);} }
    @keyframes riseUp { from{opacity:0;transform:translateY(28px);} to{opacity:1;transform:none;} }
    .rev { opacity:0; transform:translateY(26px); transition:opacity .6s ease, transform .6s ease; }
    .rev.on { opacity:1; transform:none; }

    /* ── RESPONSIVE ── */
    @media(max-width:680px){
      .links,.npill{display:none;}
      .ham{display:flex;}
      .links.open{ display:flex; flex-direction:column; position:absolute; top:70px; left:0; right:0; background:rgba(9,9,15,.96); padding:1rem; border-bottom:1px solid rgba(255,255,255,.08); z-index:999; }
      .hero{min-height:85vh;}
      section{padding:3.5rem 1.25rem;}
      .deco{display:none;}
      .stats-bar{gap:2rem;}
    }
  </style>
</head>
<body>

<div id="blobs">
  <div class="b b1"></div><div class="b b2"></div>
  <div class="b b3"></div><div class="b b4"></div>
</div>

<!-- NAV -->

    <header>
      <nav>

<script>
  const els = document.querySelectorAll('.rev');
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e,i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('on'), i * 85);
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  els.forEach(el => io.observe(el));
</script>
</body>
